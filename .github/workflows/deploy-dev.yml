name: Deploy Dev

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        name: Build, Push, and Deploy to Dev
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            HAS_ARGO_PAT: ${{ secrets.ARGO_PAT != '' }}

        steps:
            - name: Check out source code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: src/go.mod
                  cache: true

            - name: Set build metadata
              run: |
                  SHORT_SHA=$(git rev-parse --short HEAD)
                  echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
                  echo "VERSION=dev-${SHORT_SHA}" >> $GITHUB_ENV
                  echo "COMMIT_HASH=${SHORT_SHA}" >> $GITHUB_ENV
                  echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

            - name: Build binaries
              run: |
                  cd src
                  LDFLAGS="-X main.version=${VERSION} -X main.commitHash=${COMMIT_HASH} -X main.buildDate=${BUILD_DATE}"
                  GOOS=linux GOARCH=amd64 GIN_MODE=release go build -trimpath -tags "" -ldflags "${LDFLAGS}" -o ./build/release/ ./entry/...
                  mv build/release/entry build/release/otela-amd64
                  GOOS=linux GOARCH=arm64 GIN_MODE=release go build -trimpath -tags "" -ldflags "${LDFLAGS}" -o ./build/release/ ./entry/...
                  mv build/release/entry build/release/otela-arm64

            - name: Prepare Docker context
              run: |
                  cp src/build/release/otela-amd64 docker/dispatcher/
                  cp src/build/release/otela-arm64 docker/dispatcher/

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ./docker/dispatcher
                  file: ./docker/dispatcher/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/swiss-ai/opentela:dev-${{ env.SHORT_SHA }}
                      ghcr.io/swiss-ai/opentela:latest
                  platforms: linux/amd64,linux/arm64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Update rob-poc dev deployment
              if: env.HAS_ARGO_PAT == 'true'
              env:
                  ARGO_PAT: ${{ secrets.ARGO_PAT }}
              run: |
                  git clone https://x-access-token:${ARGO_PAT}@github.com/breithorn-poc/rob-poc.git /tmp/rob-poc
                  cd /tmp/rob-poc
                  sed -i "s|image: ghcr.io/swiss-ai/opentela:.*|image: ghcr.io/swiss-ai/opentela:dev-${{ env.SHORT_SHA }}|" serving-otela/dev/deployment.yaml
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add serving-otela/dev/deployment.yaml
                  git diff --cached --quiet || git commit -m "Deploy otela dev dev-${{ env.SHORT_SHA }}" && git push

    notify:
        name: Slack Notification
        runs-on: ubuntu-latest
        needs: [build-and-deploy]
        if: always()
        steps:
            - name: Notify Slack
              uses: slackapi/slack-github-action@v2
              with:
                  webhook-type: incoming-webhook
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  payload: |
                      {
                        "text": "${{ github.repository }} Deploy Dev — ${{ needs.build-and-deploy.result == 'success' && 'deployed' || 'FAILED' }}\nCommit: ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                      }
